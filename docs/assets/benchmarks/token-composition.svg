<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-labelledby="title desc">
  <title id="title">Mean Claude token composition per accepted artifact</title>
  <desc id="desc">Direct HTML used 1,313 input and 5,184 output tokens, totaling 6,497. agent-ui-render used 8,566 input and 344 output tokens, totaling 8,910. Output tokens fell 93.4 percent while total token volume rose 37.1 percent.</desc>
