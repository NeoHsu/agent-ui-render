[tools]
rust = "1.96.1"
bun = "1.3.14"

[tasks.vue-build]
dir = "renderer-vue"
run = "bun install && bun run typecheck && bun run build"

[tasks.audit]
run = ["cargo audit", "cd renderer-vue && bun audit"]

[tasks.verify-release]
depends = ["vue-build"]
run = "./scripts/verify-release.sh"

[tasks.test]
depends = ["vue-build"]
run = [
  "cargo audit",
  "cd renderer-vue && bun audit",
  "cargo fmt --all -- --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo test --workspace",
  "./scripts/verify-release.sh",
]
