[workspace]
members = ["cargo:."]

[dist]
cargo-dist-version = "0.31.0"
ci = "github"
installers = ["shell", "powershell"]
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
]
packages = ["agent-ui-render"]
hosting = "github"
pr-run-mode = "upload"
install-path = "CARGO_HOME"
github-attestations = true
# Release CI adds project-specific Vue, MSRV, audit, browser, and docs gates.
allow-dirty = ["ci"]
