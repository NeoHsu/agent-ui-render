name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build Vue renderer assets
        working-directory: renderer-vue
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun run build
      - name: Ensure generated renderer assets are committed
        run: git diff --exit-code generated/ renderer-vue/src/
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Check CLI reference docs against --help output
        run: ./scripts/check-cli-docs.sh
      - name: Release binary smoke verification
        run: ./scripts/verify-release.sh
